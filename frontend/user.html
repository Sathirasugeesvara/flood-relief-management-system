<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User page</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>Flood Relief Management</h1>
    <nav>
      <a href="request.html">Requests</a>
      <a href="login.html" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <div class="card">
      <h2>Create Relief Request</h2>
      <button class="btn btn-primary" id="newRequestBtn">+ New Request</button>
    </div>

    <div class="card">
      <h2>My Relief Requests</h2>
      <table>
        <tr>
          <th>Type</th>
          <th>District</th>
          <th>Severity</th>
          <th>Actions</th>
        </tr>
        <tr>
          <td>Food</td>
          <td>Colombo</td>
          <td><span class="status high">High</span></td>
          <td>
            <button class="btn btn-warning edit-btn">Edit</button>
            <button class="btn btn-danger delete-btn">Delete</button>
          </td>
        </tr>
        <tr>
          <td>Water</td>
          <td>Gampaha</td>
          <td><span class="status medium">Medium</span></td>
          <td>
            <button class="btn btn-warning edit-btn">Edit</button>
            <button class="btn btn-danger delete-btn">Delete</button>
          </td>
        </tr>
      </table>
    </div>

  </div>

  <footer>
    <br>
    © 2026 Flood Relief Management System – Sri Lanka
    <br><br>
  </footer>
<script src="js/script.js"></script>
</body>
</html>
