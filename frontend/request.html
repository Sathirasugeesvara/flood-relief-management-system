<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request page</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  
<div class="card" style="max-width:700px;margin:40px auto;">
      <h2>Create Relief Request</h2>
      <p style="color:#6B7280;">Fill the form below to request flood relief assistance</p>

      <form action="../backend/requestGetDB.php" method="POST">
        <label>Type of Relief</label>
        <select id="reliefType" name="reliefType" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;">
          <option value="Food">Food</option>
          <option value="Water">Water</option>
          <option value="Medicine">Medicine</option>
          <option value="Shelter">Shelter</option>

        </select>

        <label>District</label>
        <select id="district" name="district" type="text" placeholder="Enter district" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;">
          <option value="Ampara">Ampara</option>
          <option value="Anuradhapura">Anuradhapura</option>
          <option value="Badulla">Badulla</option>
          <option value="Batticaloa">Batticaloa</option>
          <option value="Colombo">Colombo</option>
          <option value="Galle">Galle</option>
          <option value="Gampaha">Gampaha</option>
          <option value="Hambantota">Hambantota</option>
          <option value="Jaffna">Jaffna</option>
          <option value="Kalutara">Kalutara</option>
          <option value="Kandy">Kandy</option>
          <option value="Kegalle">Kegalle</option>
          <option value="Kilinochchi">Kilinochchi</option>
          <option value="Kurunegala">Kurunegala</option>
          <option value="Mannar">Mannar</option>
          <option value="Matale">Matale</option>
          <option value="Matara">Matara</option>
          <option value="Monaragala">Monaragala</option>
          <option value="Mullaitivu">Mullaitivu</option>
          <option value="Nuwara Eliya">Nuwara Eliya</option>
          <option value="Polonnaruwa">Polonnaruwa</option>
          <option value="Puttalam">Puttalam</option>
          <option value="Ratnapura">Ratnapura</option>
          <option value="Trincomalee">Trincomalee</option>
          <option value="Vavuniya">Vavuniya</option>
        </select>

        <label>Divisional Secretariat</label>
        <input id="divsecre" name="divsecre" type="text" placeholder="Enter divisional secretariat" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

        <label>GN Division</label>
        <input id="gndevision" name="gndevision" type="text" placeholder="Enter GN division" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

        <label>Contact Person Name</label>
        <input id="conname" name="conname" type="text" placeholder="Enter contact person name" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

        <label>Contact Number</label>
        <input id="number" name="number"   type="text" placeholder="07XXXXXXXX" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

        <label>Address</label>
        <textarea id="address" name="address" placeholder="Enter address" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;"></textarea>

        <label>Number of Family Members</label>
        <input id="numofmembers" name="numofmembers" type="number" placeholder="e.g. 4" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

        <label>Flood Severity Level</label>
        <select id="severity" name="severity" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <label>Description / Special Requirements</label>
        <textarea id="description" name="description" placeholder="Any additional information" style="width:100%;padding:10px;margin:8px 0 20px;border-radius:6px;border:1px solid #D1D5DB;"></textarea>

        <button type="submit" class="btn btn-primary" style="width:100%;">Submit Request</button>
      </form>
    </div>

    <footer>
      <br>
    © 2026 Flood Relief Management System – Sri Lanka
    <br><br>
  </footer>
  
   <script src="js/script.js"></script>
</body>
</html>
