<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="navbar">
    <h2>Flood Relief System</h2>
    <div class="nav-links">
        <a href="dashboard_user.html">Dashboard</a>
        <a href="create_request.html">Create Request</a>
        <a href="../index.html" class="logout-btn">Logout</a>
    </div>
</div>

<div class="login-container">

    <div class="card">
        <h2>Welcome User 👋</h2>
        <p>You can create and track your relief requests.</p>
    </div>
    <div class="card">
    <h2>My Relief Requests</h2>
    <table>
        <tr>
            <th>Type</th>
            <th>District</th>
            <th>Severity</th>
            <th>Status</th>
            <th>Actions</th> <!-- New column for buttons -->
        </tr>
        <tr>
            <td>Food</td>
            <td>Kandy</td>
            <td>High</td>
            <td>Pending</td>
            <td>
                <button class="action-btn edit-btn" onclick="editRequest(this)">Edit</button>
                <button class="action-btn delete-btn" onclick="deleteRequest(this)">Delete</button>
            </td>
        </tr>
        <tr>
            <td>Water</td>
            <td>Colombo</td>
            <td>Medium</td>
            <td>Approved</td>
            <td>
                <button class="action-btn edit-btn" onclick="editRequest(this)">Edit</button>
                <button class="action-btn delete-btn" onclick="deleteRequest(this)">Delete</button>
            </td>
        </tr>
    </table>
    </div>
</div>

    
<script src="../auth.js"></script>
</body>
</html>
