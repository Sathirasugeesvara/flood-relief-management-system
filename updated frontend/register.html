<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register page</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="card" style="max-width:480px;margin:40px auto;">
          <h2 style="text-align:center;">User Registration</h2>
          <p style="text-align:center;color:#6B7280;">Create an account to request flood relief</p>

          <form>
            <label>Full Name</label>
            <input id="regName" type="text" placeholder="Enter full name" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

            <label>Email</label>
            <input id="regEmail" type="email" placeholder="Enter email address" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

            <label>Contact Number</label>
            <input type="text" placeholder="07XXXXXXXX" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

            <label>District</label>
            <input type="text" placeholder="Enter district" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;"/>

            <label>Password</label>
            <input id="regPassword" type="password" placeholder="Create password" style="width:100%;padding:10px;margin:8px 0 14px;border-radius:6px;border:1px solid #D1D5DB;" />

            <label>Confirm Password</label>
            <input id="regConfirm" placeholder="Confirm password" style="width:100%;padding:10px;margin:8px 0 20px;border-radius:6px;border:1px solid #D1D5DB;" />

            <button onclick="handleRegister()" class="btn btn-primary" style="width:100%;">Register</button>
          </form>

          <p style="text-align:center;margin-top:16px;">
            Already have an account? <a href="login.html" style="color:#0D9488;font-weight:bold;">Login</a>
          </p>
      </div>
  </div>

    <footer>
      <br>
         © 2026 Flood Relief Management System - Sri Lanka
      <br><br>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
